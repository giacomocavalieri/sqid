name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
      - uses: actions/cache@v5
        with:
          path: build
          key: gleam-build
      - run: gleam test -terl
      - run: gleam test -tjs
      - run: gleam format --check src test
